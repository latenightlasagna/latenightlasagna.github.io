<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S I M O N</title>
    <style>
        /* CSS Reset & Core Styling */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overscroll-behavior: none; 
        }

        /* --- Minimalist Header Layout --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            
            /* 3-column grid locks the center perfectly to the middle of the screen */
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            pointer-events: auto; 
        }

        /* Forces the columns to align to their respective edges */
        .nav-col.left-col { justify-content: flex-start; }
        .nav-col.right-col { justify-content: flex-end; }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- THE BULLETPROOF ALIGNMENT LOCK --- */
        /* This class is shared ONLY by the center element of the header and footer */
        .sync-grid {
            display: grid;
            /* 130px fits 'ARCHIVE' + 'shop', forcing the second column to align perfectly */
            grid-template-columns: 130px max-content; 
            text-align: left;
            pointer-events: auto;
        }

        /* Header specific vertical alignment */
        .top-nav .sync-grid {
            align-items: center;
        }

        /* Footer specific vertical alignment */
        .site-footer .sync-grid {
            align-items: start;
        }

        /* --- Scroll-to-Fly Layout --- */
        .hero-scroll-track {
            height: 140vh; 
            position: relative;
        }

        .hero-sticky-container {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
        }

        /* --- The Next Section --- */
        .video-section {
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 15vh 5vw;
            box-sizing: border-box;
        }

        .section-headline {
            font-size: 3rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 4rem 0;
            text-align: center;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #e0e0e0; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- High-End Cinematic Footer --- */
        .site-footer {
            position: relative;
            z-index: 20; 
            min-height: 100vh;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 50px;
            box-sizing: border-box;
        }

        .footer-video-bg {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            opacity: 0.4; 
            z-index: 1;
        }

        .footer-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: flex-end; 
            padding-bottom: 30px; 
        }

        /* The Footer Grid Layout */
        .footer-columns {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            margin-bottom: 8vh; 
        }

        .footer-col {
            display: flex;
            flex-direction: column;
        }
        
        .footer-col.left-col { align-items: flex-start; text-align: left; }
        .footer-col.right-col { align-items: flex-end; text-align: right; }

        .footer-sub-col {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .footer-col h4, .footer-sub-col h4 {
            font-size: 10px;
            color: #999999;
            margin: 0 0 15px 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .lowercase-title {
            text-transform: lowercase !important;
        }

        .footer-col a, .footer-col p, .footer-sub-col a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.5;
            transition: opacity 0.3s ease;
        }

        .footer-col a:hover, .footer-sub-col a:hover {
            opacity: 0.5;
        }

        /* The Massive Bottom Name */
        .footer-massive-name {
            font-size: 21.5vw; 
            font-weight: 500;
            line-height: 0.75;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
        }

        /* The very bottom legal bar */
        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .legal-links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }
        .legal-links a:hover { opacity: 0.5; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .top-nav { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
            .nav-col { gap: 20px; justify-content: center !important; }
            .sync-grid { grid-template-columns: 1fr 1fr; gap: 30px; text-align: center; }
            .top-nav .sync-grid { gap: 15px; }
            .video-grid { grid-template-columns: 1fr; }
            .section-headline { font-size: 2rem; }
            
            .site-footer { padding: 0 20px; }
            .footer-columns { display: flex; flex-direction: column; gap: 50px; margin-bottom: 8vh; margin-top: 10vh; }
            .footer-col { align-items: center !important; text-align: center !important; }
            .footer-sub-col { align-items: center; text-align: center; }
            
            .footer-massive-name { font-size: 24vw; margin-bottom: 20px; }
            .footer-bottom { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <nav class="top-nav">
        <!-- Left Nav -->
        <div class="nav-col left-col">
            <a href="/">SIMON</a>
        </div>
        
        <!-- Center Nav using the Sync Grid -->
        <div class="sync-grid">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        
        <!-- Right Nav -->
        <div class="nav-col right-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <!-- 3D Scene Track -->
    <div class="hero-scroll-track">
        <div class="hero-sticky-container">

        </div>
    </div>

    <!-- Selected Works -->
    <section id="work-section" class="video-section">
        <h2 class="section-headline">Selected Works</h2>
        <div class="video-grid">
            <div class="video-placeholder">Video Container 1</div>
            <div class="video-placeholder">Video Container 2</div>
        </div>
    </section>

    <!-- The Cinematic Footer -->
    <footer class="site-footer">
        
        <!-- Looping Video Background -->
        <video class="footer-video-bg" autoplay loop muted playsinline>
            <source src="./assets/footer-loop.mp4" type="video/mp4">
        </video>
        
        <div class="footer-content">
            
            <div class="footer-columns">
                <!-- Left Column -->
                <div class="footer-col left-col">
                    <h4>SOCIALS</h4>
                    <a href="https://www.instagram.com/latenight.lasagna/" target="_blank">Instagram</a>
                    <a href="https://de.linkedin.com/in/moinsen" target="_blank">LinkedIn</a>
                </div>
                
                <!-- Center Column using the exact same Sync Grid -->
                <div class="sync-grid">
                    <div class="footer-sub-col">
                        <h4 class="lowercase-title">shop</h4>
                        <a href="https://www.cgtrader.com/designers/latenight-lasagna" target="_blank">CGTrader</a>
                    </div>
                    <div class="footer-sub-col">
                        <h4>CONTACT</h4>
                        <a href="mailto:contact@simonhahn.de">contact@simonhahn.de</a>
                    </div>
                </div>
                
                <!-- Right Column -->
                <div class="footer-col right-col">
                    <h4>OFFICE</h4>
                    <p>Ungerstraße 12<br>04318 Leipzig<br>Germany</p>
                </div>
            </div>

            <!-- Massive Name -->
            <div class="footer-massive-name">SIMON</div>

            <!-- Legal Bar -->
            <div class="footer-bottom">
                <span>© 2026 SIMON HAHN</span>
                <div class="legal-links">
                    <a href="impressum.html">PRIVACY POLICY</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>

    <!-- UI Interactions Script (Scramble Text) -->
    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a, .sync-grid a:not([href^="mailto"])');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <!-- Core WebGL Engine Script -->
    <script>
        // Smooth Scrolling
        const lenis = new Lenis({
            lerp: 0.08, 
            smoothWheel: true
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- CAMERA RIG SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const trackballDummy = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        trackballDummy.position.z = 50; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.TrackballControls(trackballDummy, renderer.domElement);
        controls.staticMoving = false; 
        controls.dynamicDampingFactor = 0.05; 
        controls.noPan = true; 
        controls.noZoom = true; 
        controls.rotateSpeed = 2.0;

        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const IMAGE_COUNT = window.innerWidth < 768 ? 35 : 100;
        const sprites = [];
        const textureLoader = new THREE.TextureLoader();
        const imagePaths = [
            './assets/Edga_Styleframe_01.jpg',
            './assets/fuzzyFlower.jpg',
            './assets/grainytape.jpg'
        ];

        for (let i = 0; i < IMAGE_COUNT; i++) {
            const imagePath = imagePaths[i % imagePaths.length];
            const texture = textureLoader.load(imagePath);

            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            sprite.position.x = (Math.random() - 0.5) * 120;
            sprite.position.y = (Math.random() - 0.5) * 120;
            sprite.position.z = (Math.random() - 0.5) * 120; 
            
            sprite.scale.set(5, 5, 1);
            
            sprite.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02
            );

            sprite.userData.link = "./project-" + i + ".html";

            particleGroup.add(sprite);
            sprites.push(sprite);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            trackballDummy.aspect = window.innerWidth / window.innerHeight;
            trackballDummy.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const scrollTrack = document.querySelector('.hero-scroll-track');
        const targetSection = document.getElementById('work-section');
        let isAutoScrolling = false; 

        function animate() {
            requestAnimationFrame(animate);

            sprites.forEach(sprite => {
                sprite.position.add(sprite.userData.velocity);
                if (sprite.position.x > 80 || sprite.position.x < -80) sprite.userData.velocity.x *= -1;
                if (sprite.position.y > 80 || sprite.position.y < -80) sprite.userData.velocity.y *= -1;
                if (sprite.position.z > 80 || sprite.position.z < -80) sprite.userData.velocity.z *= -1;
            });

            const maxScroll = scrollTrack.offsetHeight - window.innerHeight;
            const currentScroll = Math.max(0, Math.min(window.scrollY, maxScroll));
            const scrollProgress = currentScroll / maxScroll; 

            if (scrollProgress > 0.55 && !isAutoScrolling) {
                isAutoScrolling = true; 
                lenis.scrollTo(targetSection, {
                    duration: 1.5,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                });
            }
            if (scrollProgress < 0.40 && isAutoScrolling) {
                isAutoScrolling = false;
            }

            controls.update(); 
            camera.quaternion.copy(trackballDummy.quaternion);

            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(trackballDummy.quaternion);
            const flyDistance = scrollProgress * 150; 
            camera.position.copy(trackballDummy.position).add(forwardVector.multiplyScalar(flyDistance));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
