<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My 3D Portfolio</title>
    <style>
        /* CSS Reset */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Clean, modern font */
            touch-action: none; 
        }
        
        canvas { 
            display: block; 
        }

        /* --- NEW: Header Navigation Styles --- */
        .top-nav {
            position: absolute; /* Floats over the canvas */
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* Aligns links to the right */
            z-index: 10; /* Keeps it above the 3D canvas (which is z-index 0) */
            pointer-events: none; /* Lets you click the 3D scene through the empty space */
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; /* Space between links */
            margin: 0;
            padding: 0;
            pointer-events: auto; /* Re-enables clicking exactly on the text */
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; /* Smooth fade on hover */
        }

        .nav-links a:hover {
            opacity: 0.4;
        }

        /* Mobile Optimization for the Menu */
        @media (max-width: 768px) {
            .top-nav {
                padding: 20px;
                justify-content: center; /* Center on small screens */
            }
            .nav-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 4. Interaction Constraints
        const controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.staticMoving = false; 
        controls.dynamicDampingFactor = 0.05; 
        controls.noPan = true; 
        controls.rotateSpeed = 2.0;
        controls.zoomSpeed = 1.2;
        controls.minDistance = 20;
        controls.maxDistance = 200; 

        // 5. Mobile Optimization Logic
        const IMAGE_COUNT = window.innerWidth < 768 ? 35 : 100;
        const sprites = [];
        
        // 6. Texture Loader and Image Array
        const textureLoader = new THREE.TextureLoader();
        const imagePaths = [
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg'
        ];

        // Generate the Floating Images
        for (let i = 0; i < IMAGE_COUNT; i++) {
            const imagePath = imagePaths[i % imagePaths.length];
            const texture = textureLoader.load(imagePath);

            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            sprite.position.x = (Math.random() - 0.5) * 100;
            sprite.position.y = (Math.random() - 0.5) * 100;
            sprite.position.z = (Math.random() - 0.5) * 80;
            
            sprite.scale.set(5, 5, 1);
            
            sprite.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02
            );

            sprite.userData.link = "./project-" + i + ".html";

            scene.add(sprite);
            sprites.push(sprite);
        }

        // 7. Click Detection (Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Prevent raycasting if the user clicked on a navigation link
            if (event.target.tagName.toLowerCase() === 'a') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(sprites);

            if (intersects.length > 0) {
                window.location.href = intersects[0].object.userData.link;
            }
        });

        // 8. Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 9. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            sprites.forEach(sprite => {
                sprite.position.add(sprite.userData.velocity);
                if (sprite.position.x > 110 || sprite.position.x < -110) sprite.userData.velocity.x *= -1;
                if (sprite.position.y > 110 || sprite.position.y < -110) sprite.userData.velocity.y *= -1;
                if (sprite.position.z > 80 || sprite.position.z < -80) sprite.userData.velocity.z *= -1;
            });

            controls.update(); 
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
