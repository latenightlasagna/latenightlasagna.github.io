<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S I M O N</title>
    <style>
        /* CSS Reset & Core Styling */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            /* overscroll-behavior prevents the elastic "bounce" on Mac trackpads */
            overscroll-behavior: none; 
        }

        /* --- TASK 1: New Minimalist Header Layout --- */
        .top-nav {
            position: fixed; /* Fixed so it stays over everything while scrolling */
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; /* Spreads the text out like the reference image */
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
        }

        .nav-col {
            display: flex;
            gap: 60px; /* Wide gap between items in the same column */
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.3s ease; 
        }

        .top-nav a:hover { opacity: 0.4; }

        /* --- TASK 2: Scroll-to-Fly Layout --- */
        
        /* The invisible track that creates scrollable height for the flythrough */
        .hero-scroll-track {
            height: 300vh; 
            position: relative;
        }

        /* The container that pins the 3D canvas to the screen while scrolling */
        .hero-sticky-container {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
        }

        /* --- TASK 2: The Next Section (Video Containers) --- */
        .video-section {
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 15vh 5vw;
            box-sizing: border-box;
        }

        .section-headline {
            font-size: 3rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 4rem 0;
            text-align: center;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Columns */
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #e0e0e0; /* Light grey placeholder for the video */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; }
            .nav-col { gap: 20px; justify-content: center; }
            .video-grid { grid-template-columns: 1fr; /* Stacks videos on mobile */ }
            .section-headline { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="creative-coding.html">Creative Coding</a>
            <a href="random-energy.html">Random Energy</a>
        </div>
        <div class="nav-col">
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-scroll-track">
        <div class="hero-sticky-container">
            <div id="webgl-container"></div>
        </div>
    </div>

    <section class="video-section">
        <h2 class="section-headline">Selected Works</h2>
        <div class="video-grid">
            <div class="video-placeholder">Video Container 1</div>
            <div class="video-placeholder">Video Container 2</div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>

    <script>
        // --- Initialize Smooth Scrolling ---
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            smooth: true
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);


        // --- Scene Setup ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.staticMoving = false; 
        controls.dynamicDampingFactor = 0.05; 
        controls.noPan = true; 
        // CRITICAL CHANGE: Disable zoom in TrackballControls so the scroll wheel controls the page scroll instead!
        controls.noZoom = true; 
        controls.rotateSpeed = 2.0;

        // --- The Sprite Group (The "Collection") ---
        // We put all images inside this group so we can move the entire group towards the camera on scroll
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const IMAGE_COUNT = window.innerWidth < 768 ? 35 : 100;
        const sprites = [];
        
        const textureLoader = new THREE.TextureLoader();
        const imagePaths = [
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg'
        ];

        for (let i = 0; i < IMAGE_COUNT; i++) {
            const imagePath = imagePaths[i % imagePaths.length];
            const texture = textureLoader.load(imagePath);

            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            // Adjusted spawn boundaries so all images start in front of the camera (Z = 20)
            sprite.position.x = (Math.random() - 0.5) * 100;
            sprite.position.y = (Math.random() - 0.5) * 100;
            sprite.position.z = (Math.random() * -100) + 10; // Spawns between Z=10 and Z=-90
            
            sprite.scale.set(5, 5, 1);
            
            sprite.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02
            );

            sprite.userData.link = "./project-" + i + ".html";

            // Add sprites to the GROUP, not the scene
            particleGroup.add(sprite);
            sprites.push(sprite);
        }

        // --- Click Detection (Raycaster) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName.toLowerCase() === 'a') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // Check intersection against the children of the particle group
            const intersects = raycaster.intersectObjects(particleGroup.children);

            if (intersects.length > 0) {
                // COMMENTED OUT FOR DEVELOPMENT
                // window.location.href = intersects[0].object.userData.link;
            }
        });

        // --- Handle Window Resizing ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop & Flythrough Logic ---
        const scrollTrack = document.querySelector('.hero-scroll-track');

        function animate() {
            requestAnimationFrame(animate);

            // 1. Natural Floating Animation
            sprites.forEach(sprite => {
                sprite.position.add(sprite.userData.velocity);
                if (sprite.position.x > 60 || sprite.position.x < -60) sprite.userData.velocity.x *= -1;
                if (sprite.position.y > 60 || sprite.position.y < -60) sprite.userData.velocity.y *= -1;
                if (sprite.position.z > 20 || sprite.position.z < -100) sprite.userData.velocity.z *= -1;
            });

            // 2. Scroll-to-Fly Logic
            // Calculate how far down the user has scrolled in the pinned hero track
            const maxScroll = scrollTrack.offsetHeight - window.innerHeight;
            const currentScroll = Math.max(0, Math.min(window.scrollY, maxScroll));
            const scrollProgress = currentScroll / maxScroll; // Value between 0.0 and 1.0

            // Push the entire image group forward by 150 units as the user scrolls
            // Because the camera is at Z=20, pushing the group to Z=150 forces everything to fly past the camera!
            particleGroup.position.z = scrollProgress * 150;

            controls.update(); 
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
