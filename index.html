<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S I M O N</title>
    <style>
        /* CSS Reset & Core Styling */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overscroll-behavior: none; 
        }

        /* --- Minimalist Header Layout --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            
            /* --- THE BLEND MODE MAGIC --- */
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- Scroll-to-Fly Layout --- */
        .hero-scroll-track {
            height: 140vh; 
            position: relative;
        }

        .hero-sticky-container {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
        }

        /* --- The Next Section --- */
        .video-section {
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 15vh 5vw;
            box-sizing: border-box;
        }

        .section-headline {
            font-size: 3rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 4rem 0;
            text-align: center;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #e0e0e0; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- NEW: High-End Cinematic Footer --- */
        .site-footer {
            position: relative;
            z-index: 20; 
            min-height: 100vh;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .footer-bg {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            /* Make sure to link to a high-res asset here! */
            background: url('./assets/fuzzyFlower.jpg') center center / cover no-repeat;
            opacity: 0.5; /* Darkens the image so the white text stays readable */
            z-index: 1;
            /* Subtle breathing animation for high-end feel */
            animation: slowPan 30s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .footer-content {
            position: relative;
            z-index: 2;
            padding: 5vw;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .footer-top-text {
            text-align: center;
            margin-top: 10vh;
            margin-bottom: 5vh;
        }

        .footer-top-text h2 {
            font-size: 6vw; /* Viewport width ensures it's always perfectly proportioned */
            font-weight: 500;
            letter-spacing: -2px;
            margin: 0;
            text-transform: uppercase;
        }

        /* The 4-Column Grid */
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px 0;
            margin-bottom: 5vh;
        }

        .footer-col h4 {
            font-size: 10px;
            color: #cccccc;
            margin: 0 0 15px 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .footer-col a, .footer-col p {
            display: block;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.5;
            transition: opacity 0.3s ease;
        }

        .footer-col a:hover {
            opacity: 0.5;
        }

        .footer-col input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 0;
            font-size: 14px;
            width: 100%;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .footer-col input::placeholder { color: #cccccc; }
        .footer-col input:focus { border-bottom: 1px solid #ff0000; }

        /* The Massive Bottom Name */
        .footer-massive-name {
            font-size: 18vw;
            font-weight: 500;
            line-height: 0.75;
            letter-spacing: -4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* The very bottom legal bar */
        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .legal-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 30px;
            transition: opacity 0.3s ease;
        }
        .legal-links a:hover { opacity: 0.5; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; }
            .nav-col { gap: 20px; justify-content: center; }
            .video-grid { grid-template-columns: 1fr; }
            .section-headline { font-size: 2rem; }
            
            /* Footer Mobile Adjustments */
            .footer-grid { grid-template-columns: 1fr 1fr; gap: 30px; } /* 2x2 grid on mobile */
            .footer-top-text h2 { font-size: 10vw; letter-spacing: -1px; }
            .footer-massive-name { font-size: 22vw; letter-spacing: -2px; }
            .footer-bottom { flex-direction: column; gap: 15px; align-items: flex-start; }
            .legal-links a { margin-left: 0; margin-right: 20px; }
        }
    </style>
</head>
<body>

        <div class="nav-col">

    <footer class="site-footer">
        <div class="footer-bg"></div>
        
        <div class="footer-content">

                <h2>LET'S RENDER THAT!</h2>
            </div>

            <div class="footer-grid">
                <div class="footer-col">

                    <a href="#" target="_blank">Instagram</a>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        // Smooth Scrolling
        const lenis = new Lenis({
            lerp: 0.08, 
            smoothWheel: true
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- CAMERA RIG SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const trackballDummy = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        trackballDummy.position.z = 50; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.TrackballControls(trackballDummy, renderer.domElement);
        controls.staticMoving = false; 
        controls.dynamicDampingFactor = 0.05; 
        controls.noPan = true; 
        controls.noZoom = true; 
        controls.rotateSpeed = 2.0;

        // --- The Image Cloud ---
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const IMAGE_COUNT = window.innerWidth < 768 ? 35 : 100;
        const sprites = [];
        const textureLoader = new THREE.TextureLoader();
        const imagePaths = [
            './assets/Edga_Styleframe_01.jpg',
            './assets/fuzzyFlower.jpg',
            './assets/grainytape.jpg'
        ];

        for (let i = 0; i < IMAGE_COUNT; i++) {
            const imagePath = imagePaths[i % imagePaths.length];
            const texture = textureLoader.load(imagePath);

            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            sprite.position.x = (Math.random() - 0.5) * 120;
            sprite.position.y = (Math.random() - 0.5) * 120;
            sprite.position.z = (Math.random() - 0.5) * 120; 
            
            sprite.scale.set(5, 5, 1);
            
            sprite.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02
            );

            sprite.userData.link = "./project-" + i + ".html";

            particleGroup.add(sprite);
            sprites.push(sprite);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            trackballDummy.aspect = window.innerWidth / window.innerHeight;
            trackballDummy.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Auto-Scroll Logic ---
        const scrollTrack = document.querySelector('.hero-scroll-track');
        const targetSection = document.getElementById('work-section');
        let isAutoScrolling = false; 

        function animate() {
            requestAnimationFrame(animate);

            sprites.forEach(sprite => {
                sprite.position.add(sprite.userData.velocity);
                if (sprite.position.x > 80 || sprite.position.x < -80) sprite.userData.velocity.x *= -1;
                if (sprite.position.y > 80 || sprite.position.y < -80) sprite.userData.velocity.y *= -1;
                if (sprite.position.z > 80 || sprite.position.z < -80) sprite.userData.velocity.z *= -1;
            });

            const maxScroll = scrollTrack.offsetHeight - window.innerHeight;
            const currentScroll = Math.max(0, Math.min(window.scrollY, maxScroll));
            const scrollProgress = currentScroll / maxScroll; 

            if (scrollProgress > 0.55 && !isAutoScrolling) {
                isAutoScrolling = true; 
                lenis.scrollTo(targetSection, {
                    duration: 1.5,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                });
            }
            if (scrollProgress < 0.40 && isAutoScrolling) {
                isAutoScrolling = false;
            }

            controls.update(); 
            camera.quaternion.copy(trackballDummy.quaternion);

            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(trackballDummy.quaternion);
            const flyDistance = scrollProgress * 150; 
            camera.position.copy(trackballDummy.position).add(forwardVector.multiplyScalar(flyDistance));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
