<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S I M O N</title>
    <style>
        /* CSS Reset & Core Styling */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overscroll-behavior: none; 
        }

        /* --- Minimalist Header Layout --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- Scroll-to-Fly Layout --- */
        .hero-scroll-track {
            height: 140vh; 
            position: relative;
        }

        .hero-sticky-container {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
        }

        /* --- The Next Section --- */
        .video-section {
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 15vh 5vw;
            box-sizing: border-box;
        }

        .section-headline {
            font-size: 3rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 4rem 0;
            text-align: center;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #e0e0e0; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; }
            .nav-col { gap: 20px; justify-content: center; }
            .video-grid { grid-template-columns: 1fr; }
            .section-headline { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="random-energy.html">Random Energy</a>
        </div>
        <div class="nav-col">
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-scroll-track">
        <div class="hero-sticky-container">
            <div id="webgl-container"></div>
        </div>
    </div>

    <section id="work-section" class="video-section">
        <h2 class="section-headline">Selected Works</h2>
        <div class="video-grid">
            <div class="video-placeholder">Video Container 1</div>
            <div class="video-placeholder">Video Container 2</div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        // Smooth Scrolling (Locomotive style physics)
        const lenis = new Lenis({
            lerp: 0.08, 
            smoothWheel: true
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- THE NEW CAMERA RIG SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // 1. The Real Camera (We do not set its position here anymore)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 2. The Dummy Camera (Tracks the orbit controls)
        const trackballDummy = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        trackballDummy.position.z = 50; // Pulled back slightly so the symmetric cloud looks good

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Bind the controls to the DUMMY camera, not the real one!
        const controls = new THREE.TrackballControls(trackballDummy, renderer.domElement);
        controls.staticMoving = false; 
        controls.dynamicDampingFactor = 0.05; 
        controls.noPan = true; 
        controls.noZoom = true; 
        controls.rotateSpeed = 2.0;

        // --- The Image Cloud ---
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const IMAGE_COUNT = window.innerWidth < 768 ? 35 : 100;
        const sprites = [];
        const textureLoader = new THREE.TextureLoader();
        const imagePaths = [
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg',
            './assets/Edga_Styleframe_01.jpg'
        ];

        for (let i = 0; i < IMAGE_COUNT; i++) {
            const imagePath = imagePaths[i % imagePaths.length];
            const texture = textureLoader.load(imagePath);

            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            // Rebalanced the math into a perfect cube/sphere so it looks correct from every orbit angle
            sprite.position.x = (Math.random() - 0.5) * 120;
            sprite.position.y = (Math.random() - 0.5) * 120;
            sprite.position.z = (Math.random() - 0.5) * 120; 
            
            sprite.scale.set(5, 5, 1);
            
            sprite.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02,
                (Math.random() - 0.5) * 0.02
            );

            sprite.userData.link = "./project-" + i + ".html";

            particleGroup.add(sprite);
            sprites.push(sprite);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            trackballDummy.aspect = window.innerWidth / window.innerHeight;
            trackballDummy.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Core Variables for Auto-Scroll ---
        const scrollTrack = document.querySelector('.hero-scroll-track');
        const targetSection = document.getElementById('work-section');
        let isAutoScrolling = false; 

        function animate() {
            requestAnimationFrame(animate);

            // Floating animation with updated boundaries for the new symmetric volume
            sprites.forEach(sprite => {
                sprite.position.add(sprite.userData.velocity);
                if (sprite.position.x > 80 || sprite.position.x < -80) sprite.userData.velocity.x *= -1;
                if (sprite.position.y > 80 || sprite.position.y < -80) sprite.userData.velocity.y *= -1;
                if (sprite.position.z > 80 || sprite.position.z < -80) sprite.userData.velocity.z *= -1;
            });

            // Calculate Scroll Progress
            const maxScroll = scrollTrack.offsetHeight - window.innerHeight;
            const currentScroll = Math.max(0, Math.min(window.scrollY, maxScroll));
            const scrollProgress = currentScroll / maxScroll; 

            // --- REFINED AUTO-SCROLL CUE POINTS ---
            // Triggers earlier (0.55) to make the cut into the video section feel effortless
            if (scrollProgress > 0.55 && !isAutoScrolling) {
                isAutoScrolling = true; 
                lenis.scrollTo(targetSection, {
                    duration: 1.5,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                });
            }
            // Resets earlier (0.40) to give a wide, safe buffer zone
            if (scrollProgress < 0.40 && isAutoScrolling) {
                isAutoScrolling = false;
            }

            // --- THE MATHEMATICALLY PERFECT FLYTHROUGH ---
            controls.update(); // 1. Let Trackball update the Dummy Camera

            // 2. Lock the Real Camera's rotation to the Dummy's rotation
            camera.quaternion.copy(trackballDummy.quaternion);

            // 3. Calculate the exact vector pointing straight out of the Dummy's lens
            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(trackballDummy.quaternion);
            
            // 4. Move the Real Camera forward along that vector! 
            // The Image Cloud stays at (0,0,0). The Camera flies through it. No more sliding!
            const flyDistance = scrollProgress * 150; 
            camera.position.copy(trackballDummy.position).add(forwardVector.multiplyScalar(flyDistance));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
