<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact | My Portfolio</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            touch-action: none; 
        }

        /* Header Navigation */
        .top-nav {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 10; 
            pointer-events: none; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
        }

        .nav-links a:hover { opacity: 0.4; }

        /* Contact Form */
        .contact-container {
            position: absolute;
            top: 12vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            z-index: 5;
            padding: 20px;
            box-sizing: border-box;
        }

        .contact-container h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d0d0d0;
            padding: 10px 0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-bottom: 1px solid #000000;
        }

        .form-group textarea {
            resize: none;
            height: 60px; 
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #333333; }

        /* Native Canvas Container */
        #ascii-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            /* MODIFICATION 1: Expanded to 50vh to push the effect high up the page */
            height: 50vh; 
            z-index: 1;
            display: block;
            /* Prevents the invisible parts of the canvas from blocking user clicks on the form */
            pointer-events: none; 
        }

        @media (max-width: 768px) {
            .top-nav { padding: 20px; justify-content: center; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 11px; }
            .contact-container { top: 16vh; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h1>Drop a Message</h1>
        <form action="#" method="POST">
            <div class="form-group"><input type="text" name="name" placeholder="YOUR NAME" required></div>
            <div class="form-group"><input type="email" name="email" placeholder="YOUR EMAIL" required></div>
            <div class="form-group"><textarea name="message" placeholder="WHAT'S ON YOUR MIND?" required></textarea></div>
            <button type="submit" class="submit-btn">Send Sequence</button>
        </form>
    </div>

    <canvas id="ascii-canvas"></canvas>

    <script>
        const canvas = document.getElementById('ascii-canvas');
        
        // FIX 1: Standard 2D context. Removed the alpha restriction that was crashing iOS/Safari.
        const ctx = canvas.getContext('2d'); 

        const journal = "the creative underground ";
        const cols = 120; 
        const rows = 50;  
        const totalChars = cols * rows;
        
        const tiled = journal.repeat(Math.ceil(totalChars / journal.length)).substring(0, totalChars);
        
        // Stabilized the random offsets to ensure characters don't get completely swallowed by the math
        const offsets = new Float32Array(totalChars);
        for (let i = 0; i < totalChars; i++) {
            offsets[i] = (Math.random() - 0.5) * 0.8; 
        }

        let frameCount = 0;
        let charWidth, leading, startX, startY, dynamicSize;

        function setupCanvas() {
            canvas.width = window.innerWidth;
            // Locks the internal resolution exactly to the CSS 50vh height
            canvas.height = window.innerHeight * 0.50; 

            dynamicSize = Math.max(8, (canvas.width / cols) * 1.65);
            
            // Temporarily set font just to measure 'A'
            ctx.font = `${dynamicSize}px monospace`;
            charWidth = ctx.measureText('A').width;
            leading = dynamicSize * 1.2; 
            
            startX = (canvas.width - (cols * charWidth)) / 2;
            
            // MODIFICATION 2: Set to 0 so the text draws starting exactly at the very top edge of the canvas bounding box
            startY = 0; 
        }
