<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact | SIMON</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='rgb(0,0,255)'/></svg>">
    
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            touch-action: none; 
            overscroll-behavior: none; 
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Minimalist Header Layout (Synchronized with index.html) --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            pointer-events: auto; 
        }

        .nav-col.left-col { justify-content: flex-start; }
        .nav-col.right-col { justify-content: flex-end; }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            white-space: nowrap; 
        }

        /* --- THE BULLETPROOF ALIGNMENT LOCK --- */
        .sync-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 60px; 
            width: 400px; 
            pointer-events: auto;
            align-items: center;
        }

        .sync-col-left {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            padding-right: 30px;
            box-sizing: border-box;
        }

        .sync-col-right {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            padding-left: 30px;
            box-sizing: border-box;
        }

        /* --- Contact Form Layout --- */
        .contact-container {
            position: absolute;
            top: 25vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            z-index: 50;
            padding: 20px;
            box-sizing: border-box;
        }

        .contact-container h1 {
            font-size: 10px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 500;
            text-align: center;
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d0d0d0;
            padding: 10px 0;
            margin: 0;
            font-family: inherit;
            font-size: 14px;
            text-transform: uppercase;
            color: #000000;
            line-height: normal;
            outline: none;
            box-shadow: none;
            box-sizing: border-box;
            border-radius: 0;
            appearance: none; 
            -webkit-appearance: none;
            transition: border-color 0.3s ease;
            cursor: none; /* Inherit the custom cursor for form fields */
        }

        .form-group input::placeholder, 
        .form-group textarea::placeholder {
            color: #cccccc;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-bottom: 1px solid #000000;
        }

        .form-group textarea {
            resize: none;
            height: 38px; 
            overflow: hidden;
            vertical-align: top;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            font-weight: 500;
            cursor: none; /* Inherit the custom cursor */
            transition: opacity 0.3s ease;
            margin-top: 10px;
            display: inline-block;
            white-space: nowrap;
        }

        .submit-btn:hover { 
            opacity: 0.5; 
        }

        /* --- Native Canvas Container --- */
        #ascii-canvas {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 45vh; 
            z-index: 1;
            display: block;
            pointer-events: none; 
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .top-nav a, .form-group input, .form-group textarea, .submit-btn { cursor: auto; } 
            .cursor { display: none; } 

            .top-nav { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
            .nav-col { gap: 20px; justify-content: center !important; }
            
            .sync-grid { width: 100%; display: flex; justify-content: space-around; }
            .sync-col-left, .sync-col-right { padding: 0; align-items: center; text-align: center; }

            .contact-container { top: 22vh; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-col left-col">
            <a href="/">SIMON</a>
        </div>
        
        <div class="sync-grid">
            <div class="sync-col-left">
                <a href="archive.html">ARCHIVE</a>
            </div>
            <div class="sync-col-right">
                <a href="contact.html">CONTACT</a>
            </div>
        </div>
        
        <div class="nav-col right-col">
            <a href="random-energy.html">RANDOM ENERGY</a>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Drop a Message</h1>
        <form action="#" method="POST">
            <div class="form-group"><input type="text" name="name" placeholder="YOUR NAME" required></div>
            <div class="form-group"><input type="email" name="email" placeholder="YOUR EMAIL" required></div>
            <div class="form-group"><textarea name="message" placeholder="WHAT'S ON YOUR MIND?" required></textarea></div>
            <button type="submit" class="submit-btn">SEND SEQUENCE</button>
        </form>
    </div>

    <canvas id="ascii-canvas"></canvas>

    <script>
        const cursor = document.querySelector('.cursor');
        let mouseX = -100; 
        let mouseY = -100;
        let cursorX = -100;
        let cursorY = -100;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>

    <script>
        const letters = "ABCDEFGHJKLNPRSTVXYZ0123456789#&*";
        // Target all links in the top navigation AND the submit button
        const interactiveElements = document.querySelectorAll('.top-nav a, .submit-btn');

        interactiveElements.forEach(el => {
            el.dataset.value = el.textContent.trim().toUpperCase();
            let interval = null; 

            el.addEventListener('mouseenter', () => {
                
                // Width lock to prevent jitter
                if (!el.style.width) {
                    const rect = el.getBoundingClientRect();
                    el.style.width = Math.ceil(rect.width) + 'px';
                }

                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    el.textContent = el.dataset.value
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return el.dataset.value[index];
                            if (el.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= el.dataset.value.length) {
                        clearInterval(interval);
                        el.textContent = el.dataset.value; 
                    }
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d'); 

        const journal = "the creative underground ";
        
        let cols, rows, totalChars, tiled, offsets;
        let charWidth, leading, fontSize;
        let frameCount = 0;

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.45; 

            fontSize = window.innerWidth < 768 ? 10 : 13;
            
            ctx.font = `${fontSize}px monospace`;
            charWidth = ctx.measureText('A').width;
            leading = Math.floor(fontSize * 1.2); 
            
            cols = Math.ceil(canvas.width / charWidth);
            rows = Math.ceil(canvas.height / leading);
            totalChars = cols * rows;

            tiled = journal.repeat(Math.ceil(totalChars / journal.length)).substring(0, totalChars);
            offsets = new Float32Array(totalChars);
            for (let i = 0; i < totalChars; i++) {
                offsets[i] = (Math.random() - 0.5) * 1.5; 
            }
        }

        window.addEventListener('resize', setupCanvas);
        setupCanvas(); 

        function draw() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw text in a light silver so it feels like a subtle background element
            ctx.fillStyle = "#e0e0e0";
            ctx.font = `${fontSize}px monospace`; 
            ctx.textBaseline = "top";
            
            let t = frameCount * 0.004; 
            
            for (let r = 0; r < rows; r++) {
                let lineStr = "";
                
                let verticalFade = r / rows; 
                let threshold = 0.8 - (verticalFade * 0.9);

                for (let c = 0; c < cols; c++) {
                    let idx = r * cols + c;
                    
                    let x = c * 0.12; 
                    let y = r * 0.20; 
                    
                    let wave1 = Math.sin(x * 0.83 + t * 0.7) * Math.cos(y * 0.91 - t * 0.5);
                    let wave2 = Math.sin(x * 1.73 - y * 1.33 + t * 1.1) * Math.cos(x * 0.41 + t * 0.8);
                    let chaos = Math.sin((x * y) * 2.5 + t * 1.5); 
                    
                    let n = (wave1 * 0.3) + (wave2 * 0.3) + (chaos * 0.4) + offsets[idx];
                    
                    lineStr += (n > threshold) ? tiled[idx] : " ";
                }
                
                ctx.fillText(lineStr, 0, r * leading);
            }
            
            frameCount++;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
