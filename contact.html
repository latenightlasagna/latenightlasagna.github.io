<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%; /* Explicitly locks the page height */
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            touch-action: none; 
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 100; /* Ensures nav is always on top */
            pointer-events: none; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
        }

        .nav-links a:hover { opacity: 0.4; }

        /* --- Contact Form --- */
        .contact-container {
            position: absolute;
            top: 15vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            z-index: 50;
            padding: 20px;
            box-sizing: border-box;
        }

        .contact-container h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
        }

        /* THE FIX: Forcing input and textarea to be 100% identical. 
           We use 'appearance: none' to strip away Apple/Windows default styling.
        */
        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d0d0d0;
            padding: 10px 0;
            margin: 0;
            font-family: inherit;
            font-size: 14px;
            line-height: normal;
            outline: none;
            box-shadow: none;
            box-sizing: border-box;
            border-radius: 0;
            appearance: none; 
            -webkit-appearance: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-bottom: 1px solid #000000;
        }

        .form-group textarea {
            resize: none;
            /* Matches the mathematical height of the inputs to make it look identical */
            height: 38px; 
            overflow: hidden;
            vertical-align: top;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #333333; }

        /* --- Native Canvas Container --- */
        #ascii-canvas {
            position: fixed; /* THE FIX: Locks canvas strictly to the viewport glass */
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 50vh; 
            z-index: 1;
            display: block;
            pointer-events: none; /* Prevents canvas from blocking clicks to the form */
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .top-nav { padding: 20px; justify-content: center; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 11px; }
            .contact-container { top: 18vh; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h1>Drop a Message</h1>
        <form action="#" method="POST">
            <div class="form-group"><input type="text" name="name" placeholder="YOUR NAME" required></div>
            <div class="form-group"><input type="email" name="email" placeholder="YOUR EMAIL" required></div>
            <div class="form-group"><textarea name="message" placeholder="WHAT'S ON YOUR MIND?" required></textarea></div>
            <button type="submit" class="submit-btn">Send Sequence</button>
        </form>
    </div>

    <canvas id="ascii-canvas"></canvas>

    <script>
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d'); 

        const journal = "the creative underground ";
        const cols = 120; 
        const rows = 50;  
        const totalChars = cols * rows;
        
        const tiled = journal.repeat(Math.ceil(totalChars / journal.length)).substring(0, totalChars);
        
        const offsets = new Float32Array(totalChars);
        for (let i = 0; i < totalChars; i++) {
            offsets[i] = (Math.random() - 0.5) * 0.8; 
        }

        let frameCount = 0;
        let charWidth, leading, startX, startY, dynamicSize;

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.50; 

            // THE FIX: Math.floor() guarantees a whole integer so the browser's font engine doesn't crash
            dynamicSize = Math.floor(Math.max(10, (canvas.width / cols) * 1.65));
            
            ctx.font = `${dynamicSize}px monospace`;
            charWidth = ctx.measureText('A').width;
            
            // THE FIX: Floor the leading as well
            leading = Math.floor(dynamicSize * 1.2); 
            
            startX = (canvas.width - (cols * charWidth)) / 2;
            startY = 0; 
        }

        window.addEventListener('resize', setupCanvas);
        setupCanvas(); 

        function draw() {
            // Render pure white background to wipe the previous frame cleanly
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Explicitly set text style every frame just in case context state drops
            ctx.fillStyle = "#000000";
            ctx.font = `${dynamicSize}px monospace`; 
            ctx.textBaseline = "top";
            
            let t = frameCount * 0.02; 
            
            for (let r = 0; r < rows; r++) {
                let lineStr = "";

                for (let c = 0; c < cols; c++) {
                    let idx = r * cols + c;
                    let x = c * 0.08; 
                    let y = r * 0.15; 
                    
                    let wave1 = Math.sin(x * 0.83 + t * 0.7) * Math.cos(y * 0.91 - t * 0.5);
                    let wave2 = Math.sin(x * 1.73 - y * 1.33 + t * 1.1) * Math.cos(x * 0.41 + t * 0.8);
                    let chaos = Math.sin((x + y) * 1.5 + t * 1.2); 
                    
                    let n = (wave1 * 0.4) + (wave2 * 0.3) + (chaos * 0.3) + offsets[idx];
                    
                    // Slightly lowered threshold to ensure plenty of glitch text draws
                    lineStr += (n > 0.15) ? tiled[idx] : " ";
                }
                
                ctx.fillText(lineStr, startX, startY + (r * leading));
            }
            
            frameCount++;
            
            // Swapped to standard unthrottled requestAnimationFrame for maximum reliability
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
