<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact | My Portfolio</title>
    <style>
        /* Core Layout */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            touch-action: none; 
        }

        /* Header Navigation */
        .top-nav {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 100; 
            pointer-events: none; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
        }

        .nav-links a:hover { opacity: 0.4; }

        /* Contact Form */
        .contact-container {
            position: absolute;
            top: 15vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            z-index: 50;
            padding: 20px;
            box-sizing: border-box;
        }

        .contact-container h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d0d0d0;
            padding: 10px 0;
            margin: 0;
            font-family: inherit;
            font-size: 14px;
            line-height: normal;
            outline: none;
            box-shadow: none;
            box-sizing: border-box;
            border-radius: 0;
            appearance: none; 
            -webkit-appearance: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-bottom: 1px solid #000000;
        }

        .form-group textarea {
            resize: none;
            height: 38px; 
            overflow: hidden;
            vertical-align: top;
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #333333; }

        /* Native Canvas Container */
        #ascii-canvas {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 50vh; 
            z-index: 1;
            display: block;
            pointer-events: none; 
        }

        @media (max-width: 768px) {
            .top-nav { padding: 20px; justify-content: center; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 11px; }
            .contact-container { top: 18vh; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h1>Drop a Message</h1>
        <form action="#" method="POST">
            <div class="form-group"><input type="text" name="name" placeholder="YOUR NAME" required></div>
            <div class="form-group"><input type="email" name="email" placeholder="YOUR EMAIL" required></div>
            <div class="form-group"><textarea name="message" placeholder="WHAT'S ON YOUR MIND?" required></textarea></div>
            <button type="submit" class="submit-btn">Send Sequence</button>
        </form>
    </div>

    <canvas id="ascii-canvas"></canvas>

    <script>
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d'); 

        const journal = "the creative underground ";
        
        // We declare these globally, but dynamically calculate them in setupCanvas()
        let cols, rows, totalChars, tiled, offsets;
        let charWidth, leading, fontSize;
        let frameCount = 0;

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.50; 

            // FEATURE 1: FULL WIDTH RESPONSIVE GRID
            // Choose a fixed font size (slightly smaller on mobile)
            fontSize = window.innerWidth < 768 ? 10 : 13;
            
            ctx.font = `${fontSize}px monospace`;
            charWidth = ctx.measureText('A').width;
            leading = Math.floor(fontSize * 1.2); 
            
            // Mathematically divide the screen to find exactly how many columns fill the width
            cols = Math.ceil(canvas.width / charWidth);
            rows = Math.ceil(canvas.height / leading);
            totalChars = cols * rows;

            // Rebuild the strings and arrays to match the exact screen size
            tiled = journal.repeat(Math.ceil(totalChars / journal.length)).substring(0, totalChars);
            offsets = new Float32Array(totalChars);
            for (let i = 0; i < totalChars; i++) {
                offsets[i] = (Math.random() - 0.5) * 1.5; 
            }
        }

        window.addEventListener('resize', setupCanvas);
        setupCanvas(); 

        function draw() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#000000";
            ctx.font = `${fontSize}px monospace`; 
            ctx.textBaseline = "top";
            
            let t = frameCount * 0.004; 
            
            for (let r = 0; r < rows; r++) {
                let lineStr = "";
                
                // FEATURE 2: THE VERTICAL RAMP
                // verticalFade is 0.0 at the top row, and 1.0 at the bottom row
                let verticalFade = r / rows; 
                
                // The threshold drops as it goes down the screen.
                // Top threshold = 0.8 (Requires high noise, sparse text)
                // Bottom threshold = -0.1 (Accepts low noise, dense text)
                let threshold = 0.8 - (verticalFade * 0.9);

                for (let c = 0; c < cols; c++) {
                    let idx = r * cols + c;
                    
                    let x = c * 0.12; 
                    let y = r * 0.20; 
                    
                    let wave1 = Math.sin(x * 0.83 + t * 0.7) * Math.cos(y * 0.91 - t * 0.5);
                    let wave2 = Math.sin(x * 1.73 - y * 1.33 + t * 1.1) * Math.cos(x * 0.41 + t * 0.8);
                    let chaos = Math.sin((x * y) * 2.5 + t * 1.5); 
                    
                    let n = (wave1 * 0.3) + (wave2 * 0.3) + (chaos * 0.4) + offsets[idx];
                    
                    // We compare the noise against our new gradient threshold
                    lineStr += (n > threshold) ? tiled[idx] : " ";
                }
                
                // Because the grid is dynamically calculated, startX is simply 0 (absolute left edge)
                ctx.fillText(lineStr, 0, r * leading);
            }
            
            frameCount++;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
