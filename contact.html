<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact | My Portfolio</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            touch-action: none; 
        }

        /* Header Navigation */
        .top-nav {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 10; 
            pointer-events: none; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
        }

        .nav-links a:hover { opacity: 0.4; }

        /* Contact Form */
        .contact-container {
            position: absolute;
            top: 12vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            z-index: 5;
            padding: 20px;
            box-sizing: border-box;
        }

        .contact-container h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d0d0d0;
            padding: 10px 0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-bottom: 1px solid #000000;
        }

        .form-group textarea {
            resize: none;
            height: 60px; 
        }

        .submit-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #333333; }

        /* Native Canvas Container */
        #ascii-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            /* MODIFICATION 1: Increased height from 33vh to 45vh so the canvas reaches higher up the screen */
            height: 45vh; 
            z-index: 1;
            display: block;
        }

        @media (max-width: 768px) {
            .top-nav { padding: 20px; justify-content: center; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 11px; }
            .contact-container { top: 16vh; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
