<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Energy | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            /* Hide default cursor on desktop to use our custom red dot */
            cursor: none; 
            /* Lenis required styles */
            overscroll-behavior: none;
        }

        /* --- Custom Red Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: #ff0000;
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; /* Lets you click through it */
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation (Fixed to scroll with you) --- */
        .top-nav {
            position: fixed; /* Changed to fixed so it stays visible while scrolling */
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 100; 
            pointer-events: none; 
            background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
            cursor: none; /* Keep hidden when hovering links */
        }

        .nav-links a:hover { opacity: 0.4; }

        /* --- Scroll Layout & Typography --- */
        .content-container {
            padding-top: 20vh; /* Push first item below header */
            padding-bottom: 20vh;
        }

        .project-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
            padding: 0 5vw;
            margin-bottom: 15vh;
        }

        /* Left Column: Scattered Thumbnails */
        .col-left {
            width: 25%;
            height: 60vh;
            position: relative;
        }

        .scatter-img {
            position: absolute;
            width: 120px;
            height: 80px;
            object-fit: cover;
            background-color: #eee; /* Placeholder color */
        }

        /* Scatter positioning (mimicking the video) */
        .img-1 { top: 10%; left: 0%; }
        .img-2 { top: 40%; left: 60%; width: 90px; height: 90px; }
        .img-3 { top: 80%; left: 20%; width: 140px; height: 100px; }

        /* Middle Column: Text Information */
        .col-center {
            width: 30%;
            padding: 0 4vw;
            box-sizing: border-box;
        }

        .project-desc {
            font-size: 18px;
            line-height: 1.4;
            font-weight: 400;
            margin-bottom: 40px;
        }
