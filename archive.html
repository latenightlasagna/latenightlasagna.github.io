<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout & Native Snapping --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            scroll-snap-type: y mandatory;
            overscroll-behavior: none;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        .snap-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: center;
            scroll-snap-stop: always;
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive Fixed UI Layer --- */
        .archive-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none; 
            z-index: 10;
        }

        .archive-list {
            position: absolute;
            top: 50%; 
            left: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: auto;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            display: flex;
            align-items: center;
            width: max-content;
            transform-origin: left center;
            transition: color 0.4s ease, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity; 
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; 
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .archive-item.active-text {
            color: #000000; 
            transform: scale(1.05) translateX(20px); 
        }

        .archive-item.active-text .tag {
            opacity: 1; 
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100vw; 
            height: 100vh;
            pointer-events: none; 
            z-index: 1;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; 
        }

        .gallery-group.active {
            opacity: 1;
        }

        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); 
            transform: translate(-50%, -50%) scale(1);
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: top, left, transform;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor { display: none; } 
            
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; mix-blend-mode: normal; background: #fff; }
            .top-nav a { color: #000; }
            .nav-col { gap: 20px; justify-content: center; }
            
            .archive-list { left: 20px; }
            .archive-item { font-size: 16px; }
            
            .archive-gallery { width: 100%; opacity: 0.3; } 
            .gallery-group img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <div class="scroll-track"></div>

    <div class="archive-ui">
        <div class="archive-list">
            <div class="archive-item" data-target="project-1">
                LUE.NE.COM <span class="tag">— WEB</span>
            </div>
            <div class="archive-item" data-target="project-2">
                Carabiner <span class="tag">— 3D DESIGN</span>
            </div>
            <div class="archive-item" data-target="project-3">
                Quad reprojection <span class="tag">— creative coding</span>
            </div>
            <div class="archive-item" data-target="project-4">
                SPOTIFY <span class="tag">— PERSONAL</span>
            </div>
        </div>
    </div>

    <div class="archive-gallery">
        <div class="gallery-group" id="project-1">
            <img src="./assets/Edga_Styleframe_01.jpg" alt="LUE NE COM">
        </div>
        <div class="gallery-group" id="project-2">
            <img src="./assets/carabiner_01.jpg" alt="carabiner">
            <img src="./assets/carabiner_02.jpg" alt="carabiner">
            <img src="./assets/carabiner_03.jpg" alt="carabiner">
        </div>
        <div class="gallery-group" id="project-3">
            <img src="./assets/large3.webp" alt="digital anamorphosis">
            <img src="./assets/img2.webp" alt="digital anamorphosis">
        </div>
        <div class="gallery-group" id="project-4">
            <img src="./assets/Edga_Styleframe_01.jpg" alt="Spotify">
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        let mouseX = -100; 
        let mouseY = -100;
        let cursorX = -100;
        let cursorY = -100;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        const scrollTrack = document.querySelector('.scroll-track');
        const archiveListContainer = document.querySelector('.archive-list');
        const archiveItems = document.querySelectorAll('.archive-item');
        const galleryGroups = document.querySelectorAll('.gallery-group');
        let currentIndex = -1;

        archiveItems.forEach(() => {
            const section = document.createElement('div');
            section.classList.add('snap-section');
            scrollTrack.appendChild(section);
        });

        // --- Core Randomization Engine with Collision Detection ---
        function randomizeImages(group) {
            const images = group.querySelectorAll('img');
            const isMobile = window.innerWidth < 768;
            const listRect = archiveListContainer.getBoundingClientRect();
            
            // Array to store the X, Y, and Scale of images we have successfully placed
            const placedImages = [];
            
            images.forEach((img, index) => {
                const minX = isMobile ? 20 : 35; 
                const spreadX = isMobile ? 60 : 50; 
                
                let randomLeft, randomTop, randomScale, pxLeft, pxTop;
                let isValid = false;
                
                // Fail-safe limit: Try 100 times to find a safe spot, then just give up and place it.
                let attempts = 0; 
                
                while (!isValid && attempts < 100) {
                    randomLeft = minX + Math.random() * spreadX;
                    randomTop = 15 + Math.random() * 70; 
                    
                    // NEW MORE EXTREME SCALE: Spawns between 0.85x and 1.65x
                    randomScale = 0.85 + Math.random() * 0.8;

                    // Convert percentages to pixels for math checks
                    pxLeft = (randomLeft / 100) * window.innerWidth;
                    pxTop = (randomTop / 100) * window.innerHeight;

                    // 1. Check Collision against the Text List
                    const isOverlappingList = 
                        pxLeft < (listRect.right + 50) && 
                        pxTop > (listRect.top - 50) && 
                        pxTop < (listRect.bottom + 50);

                    // 2. Check Collision against "Neighbors" (Previously placed images)
                    let isOverlappingSibling = false;
                    
                    if (!isOverlappingList) {
                        for (let sibling of placedImages) {
                            // Pythagorean theorem to find the exact pixel distance between image centers
                            const dx = pxLeft - sibling.x;
                            const dy = pxTop - sibling.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            // Calculate a dynamic safe radius based on how big the images spawned
                            const safeDistance = 180 * ((randomScale + sibling.scale) / 2);

                            if (distance < safeDistance) {
                                isOverlappingSibling = true;
                                break; 
                            }
                        }
                    }

                    // If it clears both hurdles, mark as valid and exit the while-loop!
                    if (!isOverlappingList && !isOverlappingSibling) {
                        isValid = true;
                    }
                    
                    attempts++;
                }

                // Log the final coordinates so the next image can avoid this one
                placedImages.push({ x: pxLeft, y: pxTop, scale: randomScale });

                // Apply to the DOM
                img.style.left = `${randomLeft}%`;
                img.style.top = `${randomTop}%`;
                img.style.transform = `translate(-50%, -50%) scale(${randomScale})`;
                img.style.zIndex = 10 - index; 
            });
        }

        // --- Center-Screen Sync Engine ---
        function updateScroll() {
            let newIndex = Math.round(window.scrollY / window.innerHeight);
            newIndex = Math.max(0, Math.min(newIndex, archiveItems.length - 1));

            if (newIndex !== currentIndex) {
                currentIndex = newIndex;
                
                archiveItems.forEach(i => i.classList.remove('active-text'));
                galleryGroups.forEach(g => g.classList.remove('active'));

                const activeItem = archiveItems[currentIndex];
                activeItem.classList.add('active-text');
                
                const targetId = activeItem.getAttribute('data-target');
                const targetGroup = document.getElementById(targetId);
                
                if (targetGroup) {
                    targetGroup.classList.add('active');
                    randomizeImages(targetGroup);
                }

                const itemCenterY = activeItem.offsetTop + (activeItem.offsetHeight / 2);
                archiveListContainer.style.transform = `translateY(-${itemCenterY}px)`;
            }
        }

        window.addEventListener('scroll', updateScroll);
        
        // Timeout ensures fonts are loaded before calculating collision bounding boxes
        setTimeout(updateScroll, 100);
    </script>
</body>
</html>
