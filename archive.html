<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout & Native Snapping --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            /* THE FIX: Native CSS scroll snapping guarantees no wobble and no overscroll */
            scroll-snap-type: y mandatory;
            overscroll-behavior: none;
            /* Hides the ugly native scrollbar for a cleaner look */
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* The invisible sections that drive the snapping */
        .snap-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: center;
            scroll-snap-stop: always;
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive Fixed UI Layer --- */
        .archive-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none; /* Lets the scroll wheel pass through to the snapping blocks */
            z-index: 10;
        }

        .archive-list {
            position: absolute;
            /* Locks the top of the list exactly to the center of the screen */
            top: 50%; 
            left: 50px;
            display: flex;
            flex-direction: column;
            /* TWEAK: Tightly packed list as requested */
            gap: 15px; 
            /* The animation that physically slides the list up/down when you scroll */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: auto;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            display: flex;
            align-items: center;
            width: max-content;
            transform-origin: left center;
            /* Smoothly fades and scales the text */
            transition: color 0.4s ease, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; 
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        /* The Active, Centered Text State */
        .archive-item.active-text {
            color: #000000; 
            /* Pops the active item slightly to the right and scales it up! */
            transform: scale(1.05) translateX(20px); 
        }

        .archive-item.active-text .tag {
            opacity: 1; 
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100vw; 
            height: 100vh;
            pointer-events: none; 
            z-index: 1;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; 
        }

        .gallery-group.active {
            opacity: 1;
        }

        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); 
            transform: translate(-50%, -50%) scale(1);
            /* Animates both position and scaling dynamically */
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: top, left, transform;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor { display: none; } 
            
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; mix-blend-mode: normal; background: #fff; }
            .top-nav a { color: #000; }
            .nav-col { gap: 20px; justify-content: center; }
            
            .archive-list { left: 20px; }
            .archive-item { font-size: 16px; }
            
            .archive-gallery { width: 100%; opacity: 0.3; } 
            .gallery-group img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <div class="scroll-track"></div>

    <div class="archive-ui">
        <div class="archive-list">
            <div class="archive-item" data-target="project-1">
                LUE.NE.COM <span class="tag">— WEB</span>
            </div>
            <div class="archive-item" data-target="project-2">
                Carabiner <span class="tag">— 3D DESIGN</span>
            </div>
            <div class="archive-item" data-target="project-3">
                Quad reprojection <span class="tag">— creative coding</span>
            </div>
            <div class="archive-item" data-target="project-4">
                SPOTIFY <span class="tag">— PERSONAL</span>
            </div>
        </div>
    </div>

    <div class="archive-gallery">
        <div class="gallery-group" id="project-1">
            <img src="./assets/Edga_Styleframe_01.jpg" alt="LUE NE COM">
        </div>
        <div class="gallery-group" id="project-2">
            <img src="./assets/carabiner_01.jpg" alt="carabiner">
            <img src="./assets/carabiner_02.jpg" alt="carabiner">
            <img src="./assets/carabiner_03.jpg" alt="carabiner">
        </div>
        <div class="gallery-group" id="project-3">
            <img src="./assets/large3.webp" alt="digital anamorphosis">
            <img src="./assets/img2.webp" alt="digital anamorphosis">
        </div>
        <div class="gallery-group" id="project-4">
            <img src="./assets/Edga_Styleframe_01.jpg" alt="Spotify">
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        let mouseX = -100; 
        let mouseY = -100;
        let cursorX = -100;
        let cursorY = -100;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        const scrollTrack = document.querySelector('.scroll-track');
        const archiveListContainer = document.querySelector('.archive-list');
        const archiveItems = document.querySelectorAll('.archive-item');
        const galleryGroups = document.querySelectorAll('.gallery-group');
        let currentIndex = -1;

        // --- Init: Generate the Scroll Track dynamically ---
        // This guarantees there is exactly one invisible 100vh block to snap to for every single project you add
        archiveItems.forEach(() => {
            const section = document.createElement('div');
            section.classList.add('snap-section');
            scrollTrack.appendChild(section);
        });

        // --- Core Randomization Engine ---
        function randomizeImages(group) {
            const images = group.querySelectorAll('img');
            const isMobile = window.innerWidth < 768;
            
            images.forEach((img, index) => {
                // THE FIX: Strict bounding box. 
                // Images spawn strictly between 35% and 85% width on desktop, avoiding the text list entirely!
                const minX = isMobile ? 20 : 35; 
                const spreadX = isMobile ? 60 : 50; 
                
                const randomLeft = minX + Math.random() * spreadX;
                const randomTop = 15 + Math.random() * 70; // Between 15% and 85% height
                
                // THE FIX: Random scale offset added as requested (between 0.8 and 1.2)
                const randomScale = 0.8 + Math.random() * 0.4;

                img.style.left = `${randomLeft}%`;
                img.style.top = `${randomTop}%`;
                img.style.transform = `translate(-50%, -50%) scale(${randomScale})`;
                img.style.zIndex = 10 - index; 
            });
        }

        // --- Center-Screen Sync Engine ---
        function updateScroll() {
            // Calculate which project is active based on native scroll position
            let newIndex = Math.round(window.scrollY / window.innerHeight);
            
            // Prevent going out of bounds
            newIndex = Math.max(0, Math.min(newIndex, archiveItems.length - 1));

            if (newIndex !== currentIndex) {
                currentIndex = newIndex;
                
                // Reset all classes
                archiveItems.forEach(i => i.classList.remove('active-text'));
                galleryGroups.forEach(g => g.classList.remove('active'));

                // Activate the new current project
                const activeItem = archiveItems[currentIndex];
                activeItem.classList.add('active-text');
                
                const targetId = activeItem.getAttribute('data-target');
                const targetGroup = document.getElementById(targetId);
                
                if (targetGroup) {
                    targetGroup.classList.add('active');
                    randomizeImages(targetGroup);
                }

                // THE FIX: Perfect Vertical Centering!
                // Calculate the distance of the active item from the top of the list container,
                // and translate the entire container UP by that exact amount.
                const itemCenterY = activeItem.offsetTop + (activeItem.offsetHeight / 2);
                archiveListContainer.style.transform = `translateY(-${itemCenterY}px)`;
            }
        }

        // Listen for standard native scroll
        window.addEventListener('scroll', updateScroll);
        
        // Force layout calculation on page load
        updateScroll();
    </script>
</body>
</html>
