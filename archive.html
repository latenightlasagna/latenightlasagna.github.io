<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            /* CRITICAL FIX: Removed overflow: hidden so you can actually scroll the long list! */
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            overscroll-behavior: none;
        }

        /* --- Custom Red Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: #ff0000;
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation (Identical to Landing Page) --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive List Layout --- */
        .archive-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            padding: 150px 50px 100px 50px; /* Padding top pushes list below header */
            box-sizing: border-box;
        }

        .archive-list {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 5px; /* Tight spacing like the reference video */
            z-index: 10;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; /* Light grey by default */
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            width: max-content;
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; /* Hidden by default */
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        /* Hover States for the List */
        .archive-item:hover {
            color: #000000; /* Turns solid black on hover */
        }

        .archive-item:hover .tag {
            opacity: 1; /* Tag slides and fades in */
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            right: 0;
            width: 60%;
            height: 100vh;
            pointer-events: none; /* Lets you scroll through the images */
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; /* Smooth fade in/out */
        }

        /* When the JS adds 'active', show this specific group */
        .gallery-group.active {
            opacity: 1;
        }

        /* --- Auto-Scatter Logic for 1 to 3 Images --- */
        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); /* Soft shadow to separate overlapping images */
            /* Default fallback position (Dead Center) */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* If there is exactly 1 image */
        .gallery-group img:nth-child(1):last-child {
            z-index: 10;
        }

        /* If there are 2 or 3 images, offset the FIRST one */
        .gallery-group img:nth-child(1):not(:last-child) {
            top: 45%;
            left: 40%;
            z-index: 10;
        }

        /* If there is a SECOND image, offset it to the bottom right */
        .gallery-group img:nth-child(2) {
            top: 60%;
            left: 60%;
            z-index: 9;
        }

        /* If there is a THIRD image, offset it high and right */
        .gallery-group img:nth-child(3) {
            top: 35%;
            left: 65%;
            z-index: 8;
            max-width: 250px; /* Make the 3rd one slightly smaller for depth */
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor { display: none; } 
            
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; mix-blend-mode: normal; background: #fff; }
            .top-nav a { color: #000; }
            .nav-col { gap: 20px; justify-content: center; }
            
            .archive-container { padding: 180px 20px 50px 20px; }
            .archive-list { width: 100%; }
            .archive-item { font-size: 16px; margin-bottom: 10px; }
            
            .archive-gallery { width: 100%; opacity: 0.3; } /* Keep images faint in background on mobile */
            .gallery-group img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <!-- Red Dot Cursor -->
    <div class="cursor"></div>

    <!-- Header Navigation -->
    <nav class="top-nav">
        <div class="nav-col">

        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <!-- Archive Content -->
    <div class="archive-container">
        
        <!-- Left Column: The Text List -->

    <!-- Lenis Smooth Scrolling Library -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Scramble Text Script -->
    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <!-- Cursor and Hover Logic Script -->
    <script>
        // --- Custom Red Cursor Logic ---
        const cursor = document.querySelector('.cursor');
        let mouseX = window.innerWidth / 2; 
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // --- Smooth Scrolling ---
        const lenis = new Lenis({
            lerp: 0.08, 
            smoothWheel: true
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);


        // --- Archive Hover Interaction ---
        const archiveItems = document.querySelectorAll('.archive-item');
        const galleryGroups = document.querySelectorAll('.gallery-group');

        archiveItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                // 1. Remove 'active' class from all image groups
                galleryGroups.forEach(group => group.classList.remove('active'));
                
                // 2. Get the target ID from the hovered list item
                const targetId = item.getAttribute('data-target');
                
                // 3. Add 'active' class to the specific target image group
                const targetGroup = document.getElementById(targetId);
                if (targetGroup) {
                    targetGroup.classList.add('active');
                }
            });
        });

        // Optional: If you want the images to disappear when the mouse leaves the list area entirely
        const archiveListContainer = document.querySelector('.archive-list');
        archiveListContainer.addEventListener('mouseleave', () => {
            galleryGroups.forEach(group => group.classList.remove('active'));
        });
    </script>
</body>
