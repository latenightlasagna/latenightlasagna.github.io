<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            overscroll-behavior: none;
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive List Layout --- */
        .archive-container {
            display: flex;
            width: 100%;
            /* 50vh Padding strictly guarantees the first and last items can reach absolute center */
            padding: 50vh 50px; 
            box-sizing: border-box;
        }

        .archive-list {
            width: 40%;
            display: flex;
            flex-direction: column;
            /* Increased gap so the snapping targets are clearly separated */
            gap: 25vh; 
            z-index: 10;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            width: max-content;
            /* Performance tweak for the constant JS transforms */
            will-change: transform, opacity; 
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; 
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .archive-item.active-text {
            color: #000000; 
        }

        .archive-item.active-text .tag {
            opacity: 1; 
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100vw; 
            height: 100vh;
            pointer-events: none; 
            z-index: 1;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; 
        }

        .gallery-group.active {
            opacity: 1;
        }

        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); 
            transform: translate(-50%, -50%) scale(1);
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: top, left, transform;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor { display: none; } 
            
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; mix-blend-mode: normal; background: #fff; }
            .top-nav a { color: #000; }
            .nav-col { gap: 20px; justify-content: center; }
            
            /* Responsive gap for mobile screens */
            .archive-container { padding: 50vh 20px; }
            .archive-list { width: 100%; gap: 15vh; }
            .archive-item { font-size: 16px; }
            
            .archive-gallery { width: 100%; opacity: 0.3; } 
            .gallery-group img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <div class="archive-container">
        <div class="archive-list">
            <div class="archive-item" data-target="project-1">
                LUE.NE.COM <span class="tag">— WEB</span>
            </div>
            <div class="archive-item" data-target="project-2">
                Carabiner <span class="tag">— 3D DESIGN</span>
            </div>
            <div class="archive-item" data-target="project-3">
                Quad reprojection <span class="tag">— creative coding</span>
            </div>
            <div class="archive-item" data-target="project-4">
                SPOTIFY <span class="tag">— PERSONAL</span>
            </div>
        </div>

        <div class="archive-gallery">
            <div class="gallery-group" id="project-1">
                <img src="./assets/Edga_Styleframe_01.jpg" alt="LUE NE COM">
            </div>
            <div class="gallery-group" id="project-2">
                <img src="./assets/carabiner_01.jpg" alt="carabiner">
                <img src="./assets/carabiner_02.jpg" alt="carabiner">
                <img src="./assets/carabiner_03.jpg" alt="carabiner">
            </div>
            <div class="gallery-group" id="project-3">
                <img src="./assets/large3.webp" alt="digital anamorphosis">
                <img src="./assets/img2.webp" alt="digital anamorphosis">
            </div>
            <div class="gallery-group" id="project-4">
                <img src="./assets/Edga_Styleframe_01.jpg" alt="Spotify">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        const cursor = document.querySelector('.cursor');
        let mouseX = -100; 
        let mouseY = -100;
        let cursorX = -100;
        let cursorY = -100;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        let lenis;
        try {
            lenis = new Lenis({ lerp: 0.08, smoothWheel: true });
            function raf(time) {
                lenis.raf(time);
                updateScrollState(); // Run the center detection every frame
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);
        } catch (e) {
            console.log("Smooth scroll bypassed.");
        }

        const archiveListContainer = document.querySelector('.archive-list');
        const archiveItems = document.querySelectorAll('.archive-item');
        const galleryGroups = document.querySelectorAll('.gallery-group');
        
        let currentActiveItem = null;
        let currentActiveId = null;

        // --- Core Randomization Engine ---
        function randomizeImages(group) {
            const listRect = archiveListContainer.getBoundingClientRect();
            const images = group.querySelectorAll('img');
            
            images.forEach((img, index) => {
                let randomLeft, randomTop;
                let isValid = false;
                let attempts = 0;

                const marginX = 15; 
                const marginY = 15; 

                while (!isValid && attempts < 50) {
                    randomLeft = marginX + Math.random() * (100 - marginX * 2);
                    randomTop = marginY + Math.random() * (100 - marginY * 2);

                    const pxLeft = (randomLeft / 100) * window.innerWidth;
                    const pxTop = (randomTop / 100) * window.innerHeight;

                    const isOverlappingList = 
                        pxLeft < (listRect.right + 100) && 
                        pxTop > (listRect.top - 100) && 
                        pxTop < (listRect.bottom + 100);

                    if (!isOverlappingList) {
                        isValid = true;
                    }
                    attempts++;
                }

                const randomScale = 0.85 + Math.random() * 0.3;

                img.style.left = `${randomLeft}%`;
                img.style.top = `${randomTop}%`;
                img.style.transform = `translate(-50%, -50%) scale(${randomScale})`;
                img.style.zIndex = 10 - index; 
            });
        }

        // --- Center-Screen Detection Engine ---
        function updateScrollState() {
            const centerY = window.innerHeight / 2;
            let minDistance = Infinity;
            let activeItem = null;

            archiveItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemCenter = rect.top + rect.height / 2;
                const distance = Math.abs(centerY - itemCenter);

                // Responsive fade threshold based on screen height
                const fadeThreshold = window.innerHeight * 0.3;
                const opacity = Math.max(0.15, 1 - (distance / fadeThreshold));
                item.style.opacity = opacity;
                
                // Cinematic Push to the right
                const translateX = Math.max(0, 40 - (distance * 0.15));
                item.style.transform = `translateX(${translateX}px)`;

                if (distance < minDistance) {
                    minDistance = distance;
                    activeItem = item;
                }
            });

            // Update Gallery if a new item claims the center spot
            if (activeItem && activeItem !== currentActiveItem) {
                currentActiveItem = activeItem;
                const targetId = activeItem.getAttribute('data-target');
                
                if (targetId !== currentActiveId) {
                    currentActiveId = targetId;

                    archiveItems.forEach(i => i.classList.remove('active-text'));
                    galleryGroups.forEach(group => group.classList.remove('active'));
                    
                    activeItem.classList.add('active-text');
                    
                    const targetGroup = document.getElementById(targetId);
                    if (targetGroup) {
                        targetGroup.classList.add('active');
                        randomizeImages(targetGroup);
                    }
                }
            }
        }

        // --- THE MAGNETIC SNAP ENGINE ---
        let snapTimeout;
        let isSnapping = false;

        if (lenis) {
            lenis.on('scroll', () => {
                if (isSnapping) return; // Prevent double-snapping

                clearTimeout(snapTimeout);
                
                // Debounce: Wait 120ms after the user stops physically scrolling
                snapTimeout = setTimeout(() => {
                    if (currentActiveItem) {
                        isSnapping = true;
                        
                        // Calculate exact pixel offset to put the item perfectly in the center
                        const offset = -(window.innerHeight / 2) + (currentActiveItem.offsetHeight / 2);
                        
                        lenis.scrollTo(currentActiveItem, {
                            offset: offset,
                            duration: 0.8,
                            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                        });

                        // Release the snap lock just after the animation finishes
                        setTimeout(() => { isSnapping = false; }, 850);
                    }
                }, 120); 
            });
        }

        // --- Force layout calculation on load ---
        setTimeout(updateScrollState, 50);
    </script>
</body>
</html>
