<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            overscroll-behavior: none;
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive List Layout --- */
        .archive-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            padding: 150px 50px 100px 50px; 
            box-sizing: border-box;
        }

        .archive-list {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 5px; 
            z-index: 10;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            width: max-content;
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; 
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .archive-item:hover,
        .archive-item.active-text {
            color: #000000; 
        }

        .archive-item:hover .tag,
        .archive-item.active-text .tag {
            opacity: 1; 
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            left: 0; /* Changed from right:0 so it spans the whole screen */
            width: 100vw; /* Expanded to full viewport width */
            height: 100vh;
            pointer-events: none; 
            z-index: 1;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; 
        }

        .gallery-group.active {
            opacity: 1;
        }

        /* Dynamic Image Styles */
        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); 
            transform: translate(-50%, -50%) scale(1);
            /* Added 'transform' to the CSS transitions so the scaling animates smoothly */
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor {
