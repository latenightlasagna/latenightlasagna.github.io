<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Archive | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; 
            overscroll-behavior: none;
        }

        /* --- Custom Blue Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: rgb(0, 0, 255); 
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 100; 
            pointer-events: none; 
            mix-blend-mode: difference;
        }

        .nav-col {
            display: flex;
            gap: 60px; 
            pointer-events: auto; 
        }

        .top-nav a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: none; 
        }

        /* --- Archive List Layout --- */
        .archive-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            padding: 150px 50px 100px 50px; 
            box-sizing: border-box;
        }

        .archive-list {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 5px; 
            z-index: 10;
        }

        .archive-item {
            font-size: 20px;
            font-weight: 500;
            color: #c0c0c0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            width: max-content;
        }

        .archive-item .tag {
            font-size: 10px;
            font-weight: 400;
            margin-left: 15px;
            opacity: 0; 
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .archive-item:hover,
        .archive-item.active-text {
            color: #000000; 
        }

        .archive-item:hover .tag,
        .archive-item.active-text .tag {
            opacity: 1; 
            transform: translateX(0);
        }

        /* --- Archive Gallery Layout --- */
        .archive-gallery {
            position: fixed;
            top: 0;
            left: 0; /* Changed from right:0 so it spans the whole screen */
            width: 100vw; /* Expanded to full viewport width */
            height: 100vh;
            pointer-events: none; 
            z-index: 1;
        }

        .gallery-group {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease; 
        }

        .gallery-group.active {
            opacity: 1;
        }

        /* Dynamic Image Styles */
        .gallery-group img {
            position: absolute;
            max-width: 350px;
            max-height: 45vh;
            object-fit: cover;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.1); 
            transform: translate(-50%, -50%) scale(1);
            /* Added 'transform' to the CSS transitions so the scaling animates smoothly */
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body, .archive-item, .top-nav a { cursor: auto; } 
            .cursor { display: none; } 
            
            .top-nav { padding: 20px; flex-direction: column; gap: 20px; mix-blend-mode: normal; background: #fff; }
            .top-nav a { color: #000; }
            .nav-col { gap: 20px; justify-content: center; }
            
            .archive-container { padding: 180px 20px 50px 20px; }
            .archive-list { width: 100%; }
            .archive-item { font-size: 16px; margin-bottom: 10px; }
            
            .archive-gallery { width: 100%; opacity: 0.3; } 
            .gallery-group img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-col">
            <a href="/">SIMON</a>
        </div>
        <div class="nav-col">
            <a href="archive.html">archive</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-col">
            <a href="random-energy.html">Random Energy</a>
        </div>
    </nav>

    <div class="archive-container">
        
        <div class="archive-list">
            <div class="archive-item" data-target="project-1">
                LUE.NE.COM <span class="tag">— WEB</span>
            </div>
            <div class="archive-item" data-target="project-2">
                Carabiner <span class="tag">— 3D DESIGN</span>
            </div>
            <div class="archive-item" data-target="project-3">
                Quad reprojection <span class="tag">— creative coding</span>
            </div>
            <div class="archive-item" data-target="project-4">
                SPOTIFY <span class="tag">— PERSONAL</span>
            </div>
        </div>

        <div class="archive-gallery">
            <div class="gallery-group" id="project-1">
                <img src="./assets/Edga_Styleframe_01.jpg" alt="LUE NE COM">
            </div>
            <div class="gallery-group" id="project-2">
                <img src="./assets/carabiner_01.jpg" alt="carabiner">
                <img src="./assets/carabiner_02.jpg" alt="carabiner">
                <img src="./assets/carabiner_03.jpg" alt="carabiner">
            </div>
            <div class="gallery-group" id="project-3">
                <img src="./assets/large3.webp" alt="digital anamorphosis">
                <img src="./assets/img2.webp" alt="digital anamorphosis">
            </div>
            <div class="gallery-group" id="project-4">
                <img src="./assets/Edga_Styleframe_01.jpg" alt="Spotify">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        const cursor = document.querySelector('.cursor');
        let mouseX = -100; 
        let mouseY = -100;
        let cursorX = -100;
        let cursorY = -100;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const navLinks = document.querySelectorAll('.top-nav a');

        navLinks.forEach(link => {
            link.dataset.value = link.textContent.toUpperCase();
            let interval = null; 

            link.addEventListener('mouseenter', event => {
                let iteration = 0;
                clearInterval(interval);

                interval = setInterval(() => {
                    event.target.textContent = event.target.textContent
                        .split("")
                        .map((letter, index) => {
                            if (index < iteration) return event.target.dataset.value[index];
                            if (event.target.dataset.value[index] === " ") return " ";
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");

                    if (iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
            });
        });
    </script>

    <script>
        try {
            const lenis = new Lenis({ lerp: 0.08, smoothWheel: true });
            function raf(time) {
                lenis.raf(time);
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);
        } catch (e) {
            console.log("Smooth scroll bypassed.");
        }

        // --- Archive Randomization & Hover Interaction ---
        const archiveListContainer = document.querySelector('.archive-list');
        const archiveItems = document.querySelectorAll('.archive-item');
        const galleryGroups = document.querySelectorAll('.gallery-group');

        function randomizeImages(group) {
            // Get the current dimensions and position of the text list so we can avoid it
            const listRect = archiveListContainer.getBoundingClientRect();
            const images = group.querySelectorAll('img');
            
            images.forEach((img, index) => {
                let randomLeft, randomTop;
                let isValid = false;
                let attempts = 0;

                // Margins to prevent the image from spawning completely off the edge of the monitor
                const marginX = 15; // percent
                const marginY = 15; // percent

                // Collision Detection Loop: Keep trying to find coordinates until they are safe
                while (!isValid && attempts < 50) {
                    randomLeft = marginX + Math.random() * (100 - marginX * 2);
                    randomTop = marginY + Math.random() * (100 - marginY * 2);

                    // Convert the percentage to actual pixel coordinates to check against the list
                    const pxLeft = (randomLeft / 100) * window.innerWidth;
                    const pxTop = (randomTop / 100) * window.innerHeight;

                    // Does this point overlap the text list? (Adding a 150px buffer zone)
                    const isOverlappingList = 
                        pxLeft < (listRect.right + 150) && 
                        pxTop > (listRect.top - 100) && 
                        pxTop < (listRect.bottom + 100);

                    if (!isOverlappingList) {
                        isValid = true; // Safe! Exit the loop.
                    }
                    attempts++;
                }

                // Random Scale Offset (Between 0.85 and 1.15)
                const randomScale = 0.85 + Math.random() * 0.3;

                // Apply to the DOM
                img.style.left = `${randomLeft}%`;
                img.style.top = `${randomTop}%`;
                img.style.transform = `translate(-50%, -50%) scale(${randomScale})`;
                
                img.style.zIndex = 10 - index; 
            });
        }

        archiveItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                archiveItems.forEach(i => i.classList.remove('active-text'));
                galleryGroups.forEach(group => group.classList.remove('active'));
                
                item.classList.add('active-text');

                const targetId = item.getAttribute('data-target');
                const targetGroup = document.getElementById(targetId);
                if (targetGroup) {
                    targetGroup.classList.add('active');
                    randomizeImages(targetGroup);
                }
            });
        });

        // --- INSTANT Auto-Open First Project ---
        if (archiveItems.length > 0) {
            const firstItem = archiveItems[0];
            const firstTargetId = firstItem.getAttribute('data-target');
            const firstGroup = document.getElementById(firstTargetId);

            if (firstGroup) {
                firstItem.classList.add('active-text');
                firstGroup.classList.add('active');
                // Small delay to ensure the browser has computed the listRect bounding box before randomizing
                setTimeout(() => randomizeImages(firstGroup), 50); 
            }
        }
    </script>
</body>
</html>
