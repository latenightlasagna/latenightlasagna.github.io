<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Creative Coding | My Portfolio</title>
    <style>
        /* --- Core Layout --- */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%; 
            overflow: hidden; /* We'll keep it locked for now assuming a full-screen canvas effect */
            background-color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000;
            cursor: none; /* Hides default cursor for our custom red dot */
            touch-action: none;
        }

        /* --- Custom Red Cursor --- */
        .cursor {
            width: 12px; 
            height: 12px;
            background-color: #ff0000;
            border-radius: 50%;
            position: fixed; 
            top: 0; 
            left: 0;
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%);
        }

        /* --- Header Navigation --- */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; 
            z-index: 100; 
            pointer-events: none; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
            pointer-events: auto; 
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.3s ease; 
            cursor: none; /* Keep hidden when hovering links */
        }

        .nav-links a:hover { opacity: 0.4; }

        /* --- Full Screen Container for the effect --- */
        #creative-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            body { cursor: auto; } 
            .cursor { display: none; } 
            .top-nav { padding: 20px; justify-content: center; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 11px; cursor: pointer; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="creative-coding.html">Creative Coding</a></li>
            <li><a href="random-energy.html">Random Energy</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div id="creative-canvas-container"></div>

    <script>
        // --- Custom Red Cursor Logic (Lerp physics) ---
        const cursor = document.querySelector('.cursor');
        let mouseX = window.innerWidth / 2; 
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // --- CREATIVE CODING ENGINE WILL GO HERE ---

    </script>
</body>
</html>
